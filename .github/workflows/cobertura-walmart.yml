name: Cobertura Walmart (CR + GT)

# Genera los reportes Cobertura_CR y Cobertura_GT y los publica como artifacts.
# Se dispara CUANDO se cargan las ventas / inventario nuevos:
#   1. repository_dispatch con event_type='ventas-inventario-cargados'
#      (llamar al final del script de ingesta con curl a GitHub API — ver
#       docs abajo).
#   2. Manual desde la UI de Actions (workflow_dispatch).
#
# Requiere secret: DATABASE_URL (connection string a Supabase/Postgres)
#
# ── Cómo disparar desde el bot de ingesta ─────────────────────────────
# Al final de cargar_inventario_hoy.py / sellout ingest, hacer:
#
#   import os, requests
#   requests.post(
#     'https://api.github.com/repos/BLdash28/borden-dashboard/dispatches',
#     headers={
#       'Authorization': f'token {os.environ["GH_DISPATCH_TOKEN"]}',
#       'Accept': 'application/vnd.github+json',
#     },
#     json={'event_type': 'ventas-inventario-cargados'},
#   ).raise_for_status()
#
# Crear GH_DISPATCH_TOKEN como PAT con scope 'repo' (Fine-grained:
# Contents=Read, Actions=Read/Write sobre este repo).

on:
  repository_dispatch:
    types: [ventas-inventario-cargados]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
      OUT_DIR: cobertura_out
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (solo lo necesario para los scripts)
        run: npm install --no-audit --no-fund pg xlsx

      - name: Preparar directorio de salida
        run: mkdir -p ${OUT_DIR}

      - name: Generar Cobertura CR (v5)
        run: node scripts/gen-cobertura-cr-v5.mjs

      - name: Generar Cobertura GT (v5)
        run: node scripts/gen-cobertura-gt-v5.mjs

      - name: Listar archivos generados
        run: |
          echo "── Archivos en ${OUT_DIR} ──"
          ls -la "${OUT_DIR}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-walmart-${{ github.run_number }}
          path: ${{ env.OUT_DIR }}/*.xlsx
          if-no-files-found: error
          retention-days: 30
